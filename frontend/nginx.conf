server {
    listen 80;
    # El guion bajo (_) acepta cualquier dominio, perfecto para URLs dinámicas de Cloudflare
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Esencial para que CSS y JS se carguen con el tipo correcto en todos los navegadores
    include /etc/nginx/mime.types;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        try_files $uri =404;
        # Mejora de rendimiento: cachear assets estáticos por 1 año
        expires 1y;
        add_header Cache-Control "public";
    }
}