
services:
  postgres:
    image: postgres:16
    container_name: orbit-postgres
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - orbit-network
    # Load environment variables from the .env file
    env_file:
      - ./.env
      - ./.env.local
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      - DB_HOST=postgres
    networks:
      - orbit-network
    # Load environment variables from the .env file
    env_file:
      - ./.env
      - ./.env.local
  ia-service:
    build:
      context: ./IA-service
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ./db/generated/ia-memory:/data
    # Load environment variables from the .env file
    env_file:
      - ./.env
      - ./.env.local
    environment:
      - PYTHONUNBUFFERED=1
      - MEMORY_DB_PATH=${MEMORY_DB_PATH:-/data/agent_memory.db}
      - USAGE_DB_PATH=${USAGE_DB_PATH:-/data/usage.db}
    networks:
      - orbit-network
    # Forzamos a FastAPI a escuchar en 0.0.0.0 para que sea accesible desde fuera
    command: uvicorn main:app --host 0.0.0.0 --port 5000
  gmail-service:
    build:
      context: ./gmail-service
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      - DB_HOST=postgres
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    env_file:
      - ./.env
      - ./.env.local
    networks:
      - orbit-network
    depends_on:
      - postgres
  doc-service:
    build:
      context: ./IA-service/service/doc-service
      dockerfile: Dockerfile
    ports:
      - "9002:9002"
    volumes:
      - ./db/generated/docs:/data
    environment:
      - OUTPUT_DIR=/data
    networks:
      - orbit-network
  excel-service:
    build:
      context: ./IA-service/service/excel-service
      dockerfile: Dockerfile
    ports:
      - "9004:9004"
    volumes:
      - ./db/generated/excel:/data
    environment:
      - OUTPUT_DIR=/data
    networks:
      - orbit-network
  code-service:
    build:
      context: ./IA-service/service/code-service
      dockerfile: Dockerfile
    ports:
      - "9003:9003"
    volumes:
      - ./db/generated/code:/data
    environment:
      - CODE_EXEC_TIMEOUT_SECONDS=5
      - CODE_MAX_MEMORY_MB=128
      - CODE_MAX_CHARS=12000
      - CODE_MAX_OUTPUT_CHARS=4000
      - CODE_MAX_STDIN_CHARS=4000
      - CODE_MAX_SQL_RESULT_ROWS=200
      - CODE_MAX_SQL_STATEMENTS=30
      - CODE_STRICT_MODE=true
      - CODE_PYTHON_ALLOWED_IMPORTS=math,statistics,decimal,datetime,time,json,csv,sqlite3,collections,itertools,functools,fractions,random,re,typing,pathlib,openpyxl
      - CODE_JS_ALLOWED_MODULES=
      - CODE_PYTHON_BLOCK_PATTERNS=
      - CODE_JS_BLOCK_PATTERNS=
      - CODE_SQL_BLOCK_PATTERNS=
      - CODE_SNIPPETS_DB_PATH=${CODE_SNIPPETS_DB_PATH:-/data/snippets.db}
    networks:
      - orbit-network
  mini-maps-service:
    build:
      context: ./IA-service/service/mini-maps-service
      dockerfile: Dockerfile
    ports:
      - "9005:9005"
    volumes:
      - ./db/generated/mini-maps:/data
    environment:
      - OUTPUT_DIR=/data
      - DEFAULT_CENTER_LAT=4.6373
      - DEFAULT_CENTER_LNG=-74.0840
      - DEFAULT_ZOOM=16
      - DEFAULT_USER_ID=anonymous
    networks:
      - orbit-network
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_MINI_MAPS_URL: http://localhost:9005
    ports:
      - "5173:80"
    depends_on:
      - auth-service
      - ia-service
    networks:
      - orbit-network
    # Variable de entorno común para que herramientas como Vite/React expongan el puerto
    environment:
      - HOST=0.0.0.0
      - VITE_MINI_MAPS_URL=http://localhost:9005

  prometheus:
    image: prom/prometheus:latest
    container_name: orbit-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - orbit-network

  grafana:
    image: grafana/grafana:latest
    container_name: orbit-grafana
    ports:
      - "3000:3000"
    networks:
      - orbit-network
    depends_on:
      - prometheus

networks:
  orbit-network:
    driver: bridge
