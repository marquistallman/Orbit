
services:
  postgres:
    image: postgres:16
    container_name: orbit-postgres
    restart: unless-stopped
    ports:
      - "12011:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres-data:/var/lib/postgresql/data
    networks:
      - orbit-network
    env_file:
      - ./.env
      - ./.env.local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "12001:8080"
    environment:
      - DB_HOST=postgres
    networks:
      - orbit-network
    env_file:
      - ./.env
      - ./.env.local
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  ia-service:
    build:
      context: ./IA-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "12002:5000"
    volumes:
      - ./db/generated/ia-memory:/data
    env_file:
      - ./.env
      - ./.env.local
    environment:
      - PYTHONUNBUFFERED=1
      - MEMORY_DB_PATH=${MEMORY_DB_PATH:-/data/agent_memory.db}
      - USAGE_DB_PATH=${USAGE_DB_PATH:-/data/usage.db}
      - TELEGRAM_SESSION_DB_PATH=${TELEGRAM_SESSION_DB_PATH:-/data/telegram_sessions.db}
      - RATE_LIMIT_BACKEND=${RATE_LIMIT_BACKEND:-redis}
      - RATE_LIMIT_REDIS_URL=${RATE_LIMIT_REDIS_URL:-redis://redis:6379/0}
      - RATE_LIMIT_REDIS_PREFIX=${RATE_LIMIT_REDIS_PREFIX:-orbit}
      - RATE_LIMIT_MULTIPLIER_AGENT_RUN=${RATE_LIMIT_MULTIPLIER_AGENT_RUN:-1.0}
      - RATE_LIMIT_MULTIPLIER_AGENT_ACTION=${RATE_LIMIT_MULTIPLIER_AGENT_ACTION:-0.7}
      - RATE_LIMIT_MULTIPLIER_AGENT_TOOL=${RATE_LIMIT_MULTIPLIER_AGENT_TOOL:-0.6}
      - GMAIL_SERVICE_URL=http://gmail-service:8082
    networks:
      - orbit-network
    depends_on:
      - redis
      - gmail-service
    command: uvicorn main:app --host 0.0.0.0 --port 5000
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:5000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: orbit-redis
    restart: unless-stopped
    ports:
      - "12008:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - orbit-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  gmail-service:
    build:
      context: ./gmail-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "12003:8082"
    environment:
      - DB_HOST=postgres
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    env_file:
      - ./.env
      - ./.env.local
    networks:
      - orbit-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8082/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
  doc-service:
    build:
      context: ./IA-service/service/doc-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "12004:9002"
    volumes:
      - ./db/generated/docs:/data
    environment:
      - OUTPUT_DIR=/data
    networks:
      - orbit-network

  excel-service:
    build:
      context: ./IA-service/service/excel-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "12005:9004"
    volumes:
      - ./db/generated/excel:/data
    environment:
      - OUTPUT_DIR=/data
    networks:
      - orbit-network

  code-service:
    build:
      context: ./IA-service/service/code-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "12006:9003"
    volumes:
      - ./db/generated/code:/data
    environment:
      - CODE_EXEC_TIMEOUT_SECONDS=5
      - CODE_MAX_MEMORY_MB=128
      - CODE_MAX_CHARS=12000
      - CODE_MAX_OUTPUT_CHARS=4000
      - CODE_MAX_STDIN_CHARS=4000
      - CODE_MAX_SQL_RESULT_ROWS=200
      - CODE_MAX_SQL_STATEMENTS=30
      - CODE_STRICT_MODE=true
      - CODE_PYTHON_ALLOWED_IMPORTS=math,statistics,decimal,datetime,time,json,csv,sqlite3,collections,itertools,functools,fractions,random,re,typing,pathlib,openpyxl
      - CODE_JS_ALLOWED_MODULES=
      - CODE_PYTHON_BLOCK_PATTERNS=
      - CODE_JS_BLOCK_PATTERNS=
      - CODE_SQL_BLOCK_PATTERNS=
      - CODE_SNIPPETS_DB_PATH=${CODE_SNIPPETS_DB_PATH:-/data/snippets.db}
    networks:
      - orbit-network

  mini-maps-service:
    build:
      context: ./IA-service/service/mini-maps-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "12007:9005"
    volumes:
      - ./db/generated/mini-maps:/data
    environment:
      - OUTPUT_DIR=/data
      - DEFAULT_CENTER_LAT=4.6373
      - DEFAULT_CENTER_LNG=-74.0840
      - DEFAULT_ZOOM=16
      - DEFAULT_USER_ID=anonymous
    networks:
      - orbit-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_MINI_MAPS_URL: ${VITE_MINI_MAPS_URL:-http://localhost:12007}
        VITE_API_URL: ${VITE_API_URL:-http://localhost:12001}
        VITE_IA_URL: ${VITE_IA_URL:-http://localhost:12002}
    restart: unless-stopped
    ports:
      - "12000:80"
    depends_on:
      - auth-service
      - ia-service
    networks:
      - orbit-network
    environment:
      - HOST=0.0.0.0

  prometheus:
    image: prom/prometheus:latest
    container_name: orbit-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus-alerts.yml:/etc/prometheus/alerts.yml
      - prometheus-data:/prometheus
    ports:
      - "12009:9090"
    networks:
      - orbit-network

  grafana:
    image: grafana/grafana:latest
    container_name: orbit-grafana
    restart: unless-stopped
    ports:
      - "12010:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    networks:
      - orbit-network
    depends_on:
      - prometheus

networks:
  orbit-network:
    driver: bridge

volumes:
  redis-data:
  postgres-data:
  prometheus-data:
  grafana-data:
