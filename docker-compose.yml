services:
  postgres:
    image: postgres:16
    container_name: orbit-postgres
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - orbit-network
    # Load environment variables from the .env file
    env_file:
      - ./.env
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
    networks:
      - orbit-network
    # Load environment variables from the .env file
    env_file:
      - ./.env
  ia-service:
    build:
      context: ./IA-service
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    # Load environment variables from the .env file
    env_file:
      - ./.env
    networks:
      - orbit-network
    # Forzamos a FastAPI a escuchar en 0.0.0.0 para que sea accesible desde fuera
    command: uvicorn main:app --host 0.0.0.0 --port 5000
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - auth-service
      - ia-service
    networks:
      - orbit-network
    # Variable de entorno común para que herramientas como Vite/React expongan el puerto
    environment:
      - HOST=0.0.0.0

  prometheus:
    image: prom/prometheus:latest
    container_name: orbit-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - orbit-network

  grafana:
    image: grafana/grafana:latest
    container_name: orbit-grafana
    ports:
      - "3000:3000"
    networks:
      - orbit-network
    depends_on:
      - prometheus

networks:
  orbit-network:
    driver: bridge
