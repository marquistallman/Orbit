spring.application.name=auth-service

# Configuración de conexión a PostgreSQL
# Cambia 'postgres' al final de la URL por el nombre de tu base de datos si es diferente
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/postgres
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración básica de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Variable para tu Hello World
app.greeting=Hello World! La base de datos esta conectada.

# Application URLs (para OAuth2 redirects)
app.frontend-url=${APP_FRONTEND_URL:http://localhost:12000}
app.auth-service-url=${APP_AUTH_SERVICE_URL:http://localhost:8080}

# JWT Configuration (Legacy - kept for backward compatibility)
# The secret key should be a long, random string. It's loaded from the .env file.
jwt.secret=${JWT_SECRET:default-super-secret-key-that-is-long-enough-for-hs256-and-should-be-changed}
# 24 hours in milliseconds
jwt.expiration=86400000

# Auth0 OAuth2 Resource Server Configuration
# Replace {your-auth0-domain} with your Auth0 domain (e.g., dev-abc123.us.auth0.com)
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://${auth0.domain:dev-abc123.us.auth0.com}/
spring.security.oauth2.resourceserver.jwt.audience=${AUTH0_AUDIENCE:https://api.orbit.com}
# Optional: Customize claim validation
# spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://${auth0.domain}/.well-known/jwks.json

# Auth0 Management API Credentials (M2M - Machine-to-Machine)
# Crear una "Machine-to-Machine Application" en Auth0 Dashboard
# Scopes necesarios: read:users, read:user_idp_tokens (para acceder a identidades de proveedores)
auth0.domain=${AUTH0_DOMAIN:dev-abc123.us.auth0.com}
auth0.m2m.client-id=${AUTH0_M2M_CLIENT_ID:}
auth0.m2m.client-secret=${AUTH0_M2M_CLIENT_SECRET:}

# OAuth2 Client Configuration
# Auth0 as OAuth2 Provider (Google is connected inside Auth0)
spring.security.oauth2.client.registration.auth0.client-id=${AUTH0_CLIENT_ID:}
spring.security.oauth2.client.registration.auth0.client-secret=${AUTH0_CLIENT_SECRET:}
spring.security.oauth2.client.registration.auth0.scope=openid,profile,email
spring.security.oauth2.client.registration.auth0.provider=auth0
spring.security.oauth2.client.provider.auth0.issuer-uri=https://${auth0.domain}/
spring.security.oauth2.client.provider.auth0.authorization-uri=https://${auth0.domain}/authorize
spring.security.oauth2.client.provider.auth0.token-uri=https://${auth0.domain}/oauth/token
spring.security.oauth2.client.provider.auth0.user-info-uri=https://${auth0.domain}/userinfo
spring.security.oauth2.client.provider.auth0.user-name-attribute=sub
spring.security.oauth2.client.provider.auth0.jwk-set-uri=https://${auth0.domain}/.well-known/jwks.json

# Okta
# spring.security.oauth2.client.registration.okta.client-id=YOUR_OKTA_CLIENT_ID
# spring.security.oauth2.client.registration.okta.client-secret=YOUR_OKTA_CLIENT_SECRET
# spring.security.oauth2.client.provider.okta.issuer-uri=https://YOUR_OKTA_DOMAIN.okta.com/oauth2/default

# LinkedIn
# Note: LinkedIn requires additional configuration and a developer account with OAuth 2.0 permissions.
# The basic properties are provided here.
spring.security.oauth2.client.registration.linkedin.client-id=${LINKEDIN_CLIENT_ID:placeholder}
spring.security.oauth2.client.registration.linkedin.client-secret=${LINKEDIN_CLIENT_SECRET:placeholder}
spring.security.oauth2.client.registration.linkedin.scope=profile,email,openid
spring.security.oauth2.client.registration.linkedin.provider=linkedin
spring.security.oauth2.client.registration.linkedin.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.linkedin.redirect-uri={baseUrl}/login/oauth2/code/linkedin

# LinkedIn Provider Configuration
spring.security.oauth2.client.provider.linkedin.authorization-uri=https://www.linkedin.com/oauth/v2/authorization
spring.security.oauth2.client.provider.linkedin.token-uri=https://www.linkedin.com/oauth/v2/accessToken
spring.security.oauth2.client.provider.linkedin.user-info-uri=https://api.linkedin.com/v2/userinfo
spring.security.oauth2.client.provider.linkedin.user-name-attribute=id

# Configuración de Actuator y Prometheus
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always

# Frontend Configuration
app.frontend-url=${APP_FRONTEND_URL:http://localhost:12000}
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:12000}
